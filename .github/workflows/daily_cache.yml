name: Daily Cache Build

on:
  schedule:
    - cron: '0 9 * * *'   # 6am Argentina (UTC-3) = 9am UTC
  workflow_dispatch:        # permite correrlo manualmente desde GitHub

jobs:
  build-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas pyarrow requests

      - name: Run cache builder
        env:
          CLIENTY_SUBDOMINIO: ${{ secrets.CLIENTY_SUBDOMINIO }}
          CLIENTY_USERNAME:   ${{ secrets.CLIENTY_USERNAME }}
          CLIENTY_PASSWORD:   ${{ secrets.CLIENTY_PASSWORD }}
        run: python build_cache.py

      - name: Commit and push cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/ data/
          git diff --staged --quiet || git commit -m "chore: daily cache refresh [skip ci]"
          git push
